name: Build extension zip

on:
  push:
    branches: [main]
    paths:
      - 'extension/**'
      - 'shared/**'
      - 'yarn.lock'
      - 'package.json'
      - '.github/workflows/build-extension.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build & zip extension (fresh dist, key kept for internal load-unpacked)
        run: yarn package:extension

      - name: Upload extension zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: epic-plan-extension
          path: epic-plan-extension.zip
          if-no-files-found: error

      - name: Publish rolling internal release (permanent download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: internal-latest
          name: Extension (internal, load-unpacked)
          body: |
            Внутренняя сборка расширения для Load unpacked (с фиксированным key,
            ID offbcpdoobeglioileapfcpalodcdmom). Всегда содержит последнюю версию из main.

            Установка: скачайте epic-plan-extension.zip, распакуйте до папки с manifest.json,
            откройте chrome://extensions, включите Developer mode и Load unpacked -> папка dist.
          files: epic-plan-extension.zip
          prerelease: true
          make_latest: false
