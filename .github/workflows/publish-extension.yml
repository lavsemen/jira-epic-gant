name: Publish extension (Chrome Web Store, unlisted)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared + extension
        run: |
          yarn workspace @epic-plan/shared build
          yarn workspace @epic-plan/extension build

      - name: Set version and strip local key for Chrome Web Store
        run: |
          node -e "
            const fs = require('fs');
            const path = 'extension/dist/manifest.json';
            const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
            manifest.version = '0.1.${{ github.run_number }}';
            // The Web Store assigns the item's ID; a local 'key' must not be shipped.
            delete manifest.key;
            fs.writeFileSync(path, JSON.stringify(manifest, null, 2));
            console.log('Publishing version', manifest.version);
          "

      - name: Zip extension
        run: |
          cd extension/dist
          zip -r ../../epic-plan-extension.zip .

      - name: Upload & publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: epic-plan-extension.zip
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true

      - name: Attach zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: epic-plan-extension.zip
